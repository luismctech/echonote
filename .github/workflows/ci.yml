# -----------------------------------------------------------------------------
# EchoNote — Continuous Integration
# -----------------------------------------------------------------------------
# Runs on every push and PR. Three parallel jobs:
#
#   1. fmt       — rustfmt --check (fast, fails early)
#   2. macos     — full pipeline: clippy + tests + build on Apple Silicon
#   3. linux     — `cargo check` only, to catch platform-specific drift early
#
# Phase 0 runs macOS-only as the primary dev target. Linux and Windows get
# full pipelines in Phase 1 (weeks 12-15).
# -----------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # fmt — formatting check only, gate for everything else.
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install toolchain (honors rust-toolchain.toml)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: cargo fmt --check
      run: cargo fmt --all --check

  # ---------------------------------------------------------------------------
  # macos — primary platform for Phase 0. Full clippy + tests + build.
  # Also builds the frontend and the Tauri shell crate end to end.
  # ---------------------------------------------------------------------------
  macos:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    needs: fmt
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install toolchain (honors rust-toolchain.toml)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install sccache
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

    - name: Cache cargo registry and target
      uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      with:
        shared-key: macos-14

    - name: Setup pnpm (version from packageManager field)
      uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 22
        check-latest: true
        cache: pnpm

    - name: pnpm install (frozen lockfile)
      run: pnpm install --frozen-lockfile

    - name: pnpm typecheck
      run: pnpm typecheck

    - name: pnpm test (vitest)
      # The frontend now has reducer + hook tests under src/. They
      # run in node (no jsdom) and finish in well under a second, so
      # there's no reason not to gate macOS CI on them.
      run: pnpm test

    - name: pnpm build (Vite production bundle)
      run: pnpm build

    - name: cargo clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

    # screencapturekit crate links Swift Concurrency. On GH runners the
    # dylib lives inside the Xcode toolchain, not in the dyld shared cache.
    - name: Resolve Swift runtime path
      id: swift
      run: echo "lib_dir=$(dirname $(xcrun --toolchain default -f swiftc))/../lib/swift/macosx" >> "$GITHUB_OUTPUT"

    - name: cargo test
      env:
        DYLD_FALLBACK_LIBRARY_PATH: /usr/lib/swift:${{ steps.swift.outputs.lib_dir }}
      run: cargo test --workspace --all-targets --locked

    - name: cargo build (dev profile)
      run: cargo build --workspace --locked

    - name: cargo run echo-proto --help (smoke test)
      env:
        DYLD_FALLBACK_LIBRARY_PATH: /usr/lib/swift:${{ steps.swift.outputs.lib_dir }}
      run: cargo run --locked -p echo-proto -- --help

  # ---------------------------------------------------------------------------
  # linux — cross-platform drift guard. Cheap `cargo check` so Linux-specific
  # regressions (missing cfg gates, wrong target attrs) are caught day one.
  # ---------------------------------------------------------------------------
  linux:
    name: Linux (cargo check)
    runs-on: ubuntu-24.04
    needs: fmt
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install system dependencies (Tauri + ALSA + cmake/clang for whisper.cpp)
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libasound2-dev \
          cmake \
          clang \
          libclang-dev \
          patchelf \
          pkg-config

    - name: Install toolchain (honors rust-toolchain.toml)
      uses: dtolnay/rust-toolchain@stable

    - name: Install sccache
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

    - name: Cache cargo registry and target
      uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      with:
        shared-key: ubuntu-24.04

    - name: Setup pnpm (version from packageManager field)
      uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 22
        check-latest: true
        cache: pnpm

    - name: pnpm install (frozen lockfile)
      run: pnpm install --frozen-lockfile

    - name: pnpm build (needed so src-tauri can resolve ../dist)
      run: pnpm build

    - name: cargo check
      run: cargo check --workspace --all-targets --locked

  # ---------------------------------------------------------------------------
  # audit — security vulnerability scan for Rust + npm dependencies.
  # ---------------------------------------------------------------------------
  audit:
    name: Security audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install sccache
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

    - name: cargo audit (Rust)
      run: |
        cargo install cargo-audit --locked
        cargo audit

    - name: Setup pnpm (version from packageManager field)
      uses: pnpm/action-setup@5280c022466e8e5ea34ea201e2fda33875aeefdb # v6

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 22
        check-latest: true
        cache: pnpm

    - name: pnpm install (frozen lockfile)
      run: pnpm install --frozen-lockfile

    - name: pnpm audit
      run: pnpm audit --prod || true
